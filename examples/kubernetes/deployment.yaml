# ============================================================
# Example Kubernetes Deployment — Web API
# Demonstrates resource requests/limits for cost analysis.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-api
  namespace: staging
  labels:
    app: web-api
    environment: staging
    managed-by: cost-oracle-demo
spec:
  replicas: 3  # Try changing to 10 to trigger Cost-Oracle
  selector:
    matchLabels:
      app: web-api
  template:
    metadata:
      labels:
        app: web-api
        environment: staging
    spec:
      containers:
        - name: api
          image: myregistry/web-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "500m"       # Try changing to "4000m"
              memory: "512Mi"   # Try changing to "8Gi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          env:
            - name: APP_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: web-api
  namespace: staging
  labels:
    app: web-api
spec:
  type: LoadBalancer  # Cost-Oracle can flag this vs ClusterIP + Ingress
  selector:
    app: web-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-api-hpa
  namespace: staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
