name: Agentic Cost-Oracle

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  cost-oracle:
    name: "🔥 Cost Oracle Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # 🎯 CRITICAL FIX: We tell Infracost to look inside your examples folder
      - name: Generate Infracost JSON
        run: |
          infracost breakdown --path ./examples/terraform \
                            --format json \
                            --out-file /tmp/infracost.json

      - name: Install Python Dependencies
        run: pip install groq

      # 🤖 This runs your Python Agent with the correct data
      - name: Run Agentic Oracle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python app/main.py --metadata-path /tmp/infracost.json
