name: Agentic Cost-Oracle

on:
  pull_request:
    branches: [ "main" ]
    # Triggers only when relevant infrastructure or logic files change
    paths:
      - "examples/terraform/**"
      - "app/**"
      - ".github/workflows/**"
  workflow_dispatch: # Allows manual triggering for testing

permissions:
  contents: read
  pull-requests: write

jobs:
  cost-oracle:
    name: "🔥 Cost Oracle Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost JSON
        run: |
          infracost breakdown --path ./examples/terraform \
                            --format json \
                            --out-file /tmp/infracost.json
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq requests  # Added requests in case your script calls GH APIs

      - name: Run Agentic Oracle
        id: oracle_run
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Passing PR context to the script can be helpful for the agent
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python app/main.py --metadata-path /tmp/infracost.json
