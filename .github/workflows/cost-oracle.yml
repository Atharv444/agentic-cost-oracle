name: Agentic Cost-Oracle

on:
  pull_request:
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/docker-compose*"
      - "**/Dockerfile"

permissions:
  contents: read
  pull-requests: write

env:
  INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  cost-oracle:
    name: "💰 Cost Oracle Analysis"
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base-branch

      # ── Infracost Setup ──────────────────────────────────────
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ env.INFRACOST_API_KEY }}

      # ── Generate Cost Breakdown (base) ───────────────────────
      - name: Generate Infracost baseline
        run: |
          infracost breakdown \
            --path=base-branch \
            --format=json \
            --out-file=/tmp/infracost-base.json || true

      # ── Generate Cost Breakdown (PR) ─────────────────────────
      - name: Generate Infracost PR breakdown
        run: |
          infracost breakdown \
            --path=. \
            --format=json \
            --out-file=/tmp/infracost-pr.json || true

      # ── Generate Diff ────────────────────────────────────────
      - name: Generate Infracost diff
        run: |
          infracost diff \
            --path=. \
            --compare-to=/tmp/infracost-base.json \
            --format=json \
            --out-file=/tmp/infracost-diff.json || true

      # ── Python Setup ─────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Run Cost Oracle Agent ────────────────────────────────
      - name: Run Agentic Cost-Oracle
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
          INFRACOST_DIFF_PATH: /tmp/infracost-diff.json
          INFRACOST_PR_PATH: /tmp/infracost-pr.json
          INFRACOST_BASE_PATH: /tmp/infracost-base.json
        run: python -m app.main

      # ── Upload Artifacts ─────────────────────────────────────
      - name: Upload cost reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cost-oracle-reports
          path: |
            /tmp/infracost-*.json
            /tmp/cost-oracle-comment.md
          retention-days: 30
